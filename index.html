<!DOCTYPE html>
<html>
<head>
    <title>Friend's Pet! - Detective Agency</title>
    <link rel="icon" type="image/png" href="LogoKucing.png">
    <style>
        body {
            font-family: 'Special Elite', cursive; 
            margin: 0;
            padding: 100px;
            background-color: #34495E;
            background-image: linear-gradient(rgba(255, 255, 255, 0.07) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.07) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #FFFFFF;
        }

        .logo-container {
            text-align: center; 
            margin-bottom: 5px;
        }
        .logo-container img {
            width: 300px; /* Made logo slightly bigger for the homepage */
            height: auto;
        }
        
        nav {
            text-align: center; /* Centered nav on homepage */
            margin-top: 20px;
            margin-bottom: 20px;
        }
        nav a {
            color: #FFFFFF;
            font-weight: bold;
            font-size: 20px;
            padding: 10px 15px;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 4px;
            margin: 0 10px;
        }
        nav a:hover {
            background-color: rgba(255,255,255,0.1);
        }
        
        hr {
            border: 0;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
        }
        
        /* New styles for the homepage content */
        .welcome-container {
            text-align: center;
            margin-top: 50px;
            padding: 40px;
            background-color: rgba(0,0,0,0.2);
            border-radius: 5px;
        }
        .welcome-container h1 {
            font-size: 48px;
            margin: 0;
        }
        .welcome-container p {
            font-size: 20px;
            max-width: 600px;
            margin: 20px auto 30px auto;
            line-height: 1.6;
        }
        .cta-button {
            display: inline-block;
            padding: 15px 30px;
            font-size: 22px;
            font-family: 'Special Elite', cursive;
            font-weight: bold;
            color: #34495E;
            background-color: #fdfaee;
            text-decoration: none;
            border-radius: 5px;
            box-shadow: 3px 3px 5px rgba(0,0,0,0.3);
            transition: transform 0.2s ease;
        }
        .cta-button:hover {
            transform: scale(1.05);
        }

    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
</head>
<body>

    <div class="logo-container">
        <img src="LogoKucing.png" alt="Friend's Pet Logo">
    </div>
    <hr>
    <nav>
       
    </nav>

    <div class="welcome-container">
        <h1>The Pet Detective Agency</h1>
        <p>Investigating the city's most wanted subjects. Each file documents the unique characteristics, criminal records, and whereabouts of our primary persons of interest. Proceed with caution.</p>
        <a href="case-files.html" class="cta-button">View Case Files</a>
    </div>

</body>
</html>
