<!DOCTYPE html>
<html>
<head>
    <title>Case File Not Found (404)</title>
    <link rel="icon" type="image/png" href="LogoKucing.png">
    <style>
        body {
            font-family: 'Special Elite', cursive; 
            margin: 0;
            padding: 100px;
            background-color: #34495E;
            background-image: linear-gradient(rgba(255, 255, 255, 0.07) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.07) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .error-container {
            background-color: #fdfaee;
            border: 1px solid #333;
            border-radius: 3px;
            padding: 40px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.4); 
            text-align: center;
            max-width: 600px;
            position: relative;
            overflow: hidden;
        }

        .error-watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-10deg);
            font-size: 200px;
            font-weight: bold;
            color: rgba(0,0,0,0.05);
            z-index: 1;
        }

        .error-header {
            font-size: 48px;
            font-weight: bold;
            color: #a00; /* Red color for emphasis */
            margin: 0;
            position: relative;
            z-index: 2;
        }

        .error-subheader {
            font-size: 24px;
            color: #333;
            margin: 10px 0 25px 0;
            position: relative;
            z-index: 2;
        }

        .error-message {
            font-size: 18px;
            color: #444;
            line-height: 1.7;
            text-align: left;
            border-top: 1px dashed #aaa;
            padding-top: 20px;
            position: relative;
            z-index: 2;
        }

        .return-button {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 25px;
            font-size: 18px;
            font-family: 'Special Elite', cursive;
            font-weight: bold;
            color: #fdfaee;
            background-color: #c0392b;
            text-decoration: none;
            border-radius: 5px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.2s ease;
            position: relative;
            z-index: 2;
        }

        .return-button:hover {
            transform: scale(1.05);
        }

    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
</head>
<body>

    <div class="error-container">
        <div class="error-watermark">404</div>
        <h1 class="error-header">FILE MISSING</h1>
        <p class="error-subheader">Case File Not Found</p>
        <div class="error-message">
            <strong>ATTENTION AGENT:</strong> The document you are attempting to access does not exist in our records. It may have been misfiled, redacted, or never existed. Please verify the file number and try again. Do not attempt to access unauthorized files.
        </div>
        <a href="case-files.html" class="return-button">Return to Headquarters</a>
    </div>

</body>
</html>
